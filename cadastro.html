<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - GlowBeauty</title>
    <!-- CSS da home + estilos específicos -->
    <style>

         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink-primary: #FF69B4;
            --pink-light: #FFB6C1;
            --purple-primary: #8A2BE2;
            --purple-dark: #663399;
            --white: #FFFFFF;
            --gray-light: #F8F9FA;
            --gray: #6C757D;
            --shadow: 0 20px 40px rgba(255, 105, 180, 0.2);
            --shadow-hover: 0 25px 50px rgba(138, 43, 226, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 2px 20px rgba(255, 105, 180, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: linear-gradient(90deg, var(--pink-primary), var(--purple-primary));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--purple-primary);
        }

        .cart-icon {
            position: relative;
            font-size: 1.5rem;
            color: var(--pink-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cart-icon:hover {
            transform: scale(1.2);
            color: var(--purple-primary);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--pink-primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--pink-primary);
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, 
                rgba(255, 105, 180, 0.9) 0%, 
                rgba(138, 43, 226, 0.9) 50%, 
                rgba(255, 182, 193, 0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><defs><radialGradient id="a" cx="50%" cy="50%"><stop offset="0%" stop-color="%23FF69B40F"/><stop offset="100%" stop-color="%238A2BE20F"/></radialGradient></defs><rect width="100%" height="100%" fill="url(%23a)"/></svg>');
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .hero-content {
            max-width: 800px;
            padding: 0 2rem;
            position: relative;
            z-index: 2;
            animation: slideInUp 1s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: clamp(3rem, 5vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            opacity: 0.95;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.8);
        }

        .btn-secondary:hover {
            background: white;
            color: var(--purple-primary);
            transform: translateY(-3px);
        }

        /* Featured Products */
        .featured {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--gray-light);
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 4rem;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--pink-primary), var(--purple-primary));
            transition: left 0.4s ease;
        }

        .product-card:hover::before {
            left: 0;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .product-image {
            width: 180px;
            height: 180px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-light), var(--purple-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover .product-image {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.4);
        }

        .product-info h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .product-rating {
            display: flex;
            justify-content: center;
            gap: 0.2rem;
            margin-bottom: 1.5rem;
        }

        .star {
            color: #FFD700;
            font-size: 1.2rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow);
        }

        /* Stats Section */
        .stats {
            padding: 80px 5%;
            background: linear-gradient(135deg, var(--purple-primary), var(--pink-primary));
            color: white;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            max-width: 1000px;
            margin: 3rem auto 0;
        }

        .stat-item i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Newsletter */
        .newsletter {
            padding: 100px 5%;
            background: var(--gray-light);
            text-align: center;
        }

        .newsletter-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .newsletter h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .newsletter p {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            color: var(--gray);
        }

        .newsletter-form {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .newsletter-input {
            flex: 1;
            min-width: 250px;
            padding: 1.2rem 1.5rem;
            border: 2px solid #e9ecef;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .newsletter-input:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.1);
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 4rem 5% 2rem;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .footer-section h3 {
            color: var(--pink-primary);
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }

        .footer-section a {
            color: #ccc;
            text-decoration: none;
            display: block;
            margin-bottom: 0.8rem;
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--pink-primary);
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid #333;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                display: none;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .newsletter-form {
                flex-direction: column;
                align-items: center;
            }

            .newsletter-input {
                width: 100%;
                min-width: auto;
            }
        }

        /* Scroll animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
      
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, 
                rgba(255, 105, 180, 0.1) 0%, 
                rgba(138, 43, 226, 0.1) 50%, 
                rgba(255, 182, 193, 0.1) 100%);
        }
        
        .auth-card {
            background: white;
            padding: 3.5rem;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(255, 105, 180, 0.25);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .auth-header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafbfc;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.1);
            background: white;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .strength-weak { background: #ff4757; width: 25%; }
        .strength-medium { background: #ffa502; width: 50%; }
        .strength-strong { background: linear-gradient(90deg, var(--pink-primary), var(--purple-primary)); width: 100%; }
        
        .signup-btn {
            width: 100%;
            padding: 1.3rem;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 1rem;
        }
        
        .auth-links {
            text-align: center;
            margin-top: 2rem;
        }
        
        .auth-links a {
            color: var(--purple-primary);
            text-decoration: none;
            font-weight: 500;
        }

        /* NOVO: botão voltar */
.back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
    color: white;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    z-index: 2000;
    transition: all 0.3s ease;
}

.back-button:hover {
    transform: scale(1.1);
}

/* NOVO: notificação */
.toast {
    position: fixed;
    top: 100px;
    right: 20px;
    background: linear-gradient(135deg, var(--pink-primary), var(--purple-primary));
    color: white;
    padding: 1rem 2rem;
    border-radius: 50px;
    box-shadow: var(--shadow);
    transform: translateX(400px);
    transition: transform 0.4s ease;
    z-index: 3000;
    font-weight: 500;
}
@media (max-width: 768px) {

    .auth-container {
        padding: 1.5rem 1rem;
        align-items: flex-start;
        justify-content: center;
    }

    .auth-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
        max-width: 100%;
    }

    .auth-header h1 {
        font-size: 2rem;
    }

    .auth-header p {
        font-size: 0.95rem;
    }

    /* FORMULÁRIO EM COLUNA (ESSENCIAL) */
    .form-row {
        grid-template-columns: 1fr;
        gap: 1rem;
    }

    .form-group {
        margin-bottom: 1.2rem;
    }

    .form-input {
        padding: 1rem 1.2rem;
        font-size: 0.95rem;
        border-radius: 12px;
    }

    .signup-btn {
        padding: 1.1rem;
        font-size: 1rem;
    }

    /* botão voltar mais elegante no mobile */
    .back-button {
        width: 40px;
        height: 40px;
        font-size: 1rem;
        top: 15px;
        left: 15px;
    }

    /* toast melhor posicionado */
    .toast {
        top: 80px;
        right: 10px;
        padding: 0.8rem 1.2rem;
        font-size: 0.9rem;
    }
}

    </style>
</head>
<body>
    <!-- HEADER SIMPLIFICADO -->
    <!-- NOVO: BOTÃO VOLTAR -->
<button class="back-button" onclick="goBack()">←</button>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-user-plus"></i> Crie sua Conta</h1>
                <p>Junte-se a milhares de mulheres que já brilham com GlowBeauty</p>
            </div>
            
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" class="form-input" placeholder="(11) 99999-9999" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-input" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Idade</label>
                    <input type="number" class="form-input" min="18" max="100" placeholder="18+" required>
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" class="form-input" id="password" required>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                
                <button type="submit" class="btn btn-primary signup-btn">
                    <span id="signupText">Criar Conta</span>
                    <span class="loading" style="display: none;"></span>
                </button>
            </form>
            
            <div class="auth-links">
                <p>Já tem conta? <a href="index.html">Faça login</a></p>
            </div>
        </div>
    </div>
    
    <script>
        // Validação de senha em tempo real
        document.getElementById('password').addEventListener('input', function() {
            const strengthBar = document.getElementById('passwordStrength');
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 3) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        });
        
       
// NOVO: voltar página
function goBack() {
    window.history.back();
}

// NOVO: cadastro
function handleSignup(event) {
    event.preventDefault();

    const form = document.getElementById('signupForm');
    const btnText = document.getElementById('signupText');
    const loading = document.querySelector('.loading');

    // loading visual
    btnText.style.display = 'none';
    loading.style.display = 'inline-block';

    setTimeout(() => {

        // limpa formulário
        form.reset();
        document.getElementById('passwordStrength').className = 'password-strength';

        // restaura botão
        btnText.style.display = 'inline';
        loading.style.display = 'none';

        // mostra notificação
        showToast('✅ Cadastro realizado com sucesso!');

    }, 1200);
}

// NOVO: toast bonitinho
function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.style.transform = 'translateX(0)';
    }, 100);

    setTimeout(() => {
        toast.style.transform = 'translateX(400px)';
        setTimeout(() => toast.remove(), 400);
    }, 3000);
}
    </script>
</body>
